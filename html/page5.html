<!DOCTYPE html>
<html lang = "vi">
	<head>
		<title>Nhập dữ liệu với prompt() và hiển thị với alert ()</title>
		<meta charset = "utf-8">
	</head>
	  <body>
		<script>
		let name = prompt("Hãy nhập tên bạn :");
		let yob = Number(prompt("Hãy nhập năm sinh của bạn :"));
		window.alert("Xin Chào " + name + " năm 2026 bạn đã " + (2026-yob)+ " tuổi rồi ");
		</script>
	  </body>
		
<html>
