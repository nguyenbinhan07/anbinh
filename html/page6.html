<!DOCTYPE html>
<html lang = "vi">
	<head>
		<title>Nhập dữ liệu với prompt() và hiển thị với alert ()</title>
		<meta charset = "utf-8">
	</head>
	  <body>
		<script>
		let d = Number(prompt("Hãy nhập chiều dài hình chữ nhật :"));
		let r = Number(prompt("Hãy nhập chiều rộng hình chữ nhật :"));
		if (d<r)
		 alert("Bạn đã nhập sai! Vui lòng nhập lại chiều dài phải lớn hơn chiều rộng");
		 else if (d==r)
		 alert("TRƯỜNG HỌP ĐẶC BIỆT LÀ HÌNH VUÔNG có diện tích là : " +  d*r);
		 else
		 alert("Diện tích hình chữ nhật là : " +d*r);
		</script>
	  </body>
		
<html>
